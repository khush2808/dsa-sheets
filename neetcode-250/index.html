<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NeetCode 250</title>
    <link rel="stylesheet" href="../assets/app.css?v=5" />
  </head>
  <body>
    <div class="shell">
      <aside class="side">
        <div class="brand">
          <div class="mark">250</div>
          <div>
            <h1></h1>
            <p></p>
          </div>
        </div>
        <nav class="nav-links">
          <a href="../strivers-a2z-sheet/">Striver A2Z</a>
          <a href="../blind-75-sheet/">Blind 75 Sheet</a>
          <a href="../sde-sheet/">SDE Sheet</a>
          <a href="../striver-79-sheet/">Striver 79</a>
          <a href="../neetcode-all/">NeetCode All</a>
          <a aria-current="page" href="../neetcode-250/">NeetCode 250</a>
          <a href="../neetcode-150/">NeetCode 150</a>
          <a href="../blind-75/">NeetCode Blind 75</a>
          <a class="download" href="../sheets/neetcode-250-problems.xlsx">Download Excel</a>
          <a class="download" href="../sheets/dsa-problem-lists.xlsx">Download All</a>
        </nav>
        <h2>Patterns</h2>
        <div class="category-list"></div>
      </aside>
      <main class="main">
        <section class="top">
          <div class="hero">
            <canvas id="heroCanvas"></canvas>
            <div class="hero-content">
              <p class="eyebrow"></p>
              <h2></h2>
              <p></p>
            </div>
          </div>
          <aside class="summary">
            <div class="stat-grid"></div>
          </aside>
        </section>
        <section class="toolbar">
          <input id="search" type="search" placeholder="Search problems" />
          <select id="categoryFilter"></select>
          <fieldset id="difficultyFilter" class="difficulty-checklist">
            <legend>Difficulty</legend>
            <label><input type="checkbox" value="easy" checked />Easy</label>
            <label><input type="checkbox" value="medium" checked />Medium</label>
            <label><input type="checkbox" value="hard" checked />Hard</label>
          </fieldset>
          <select id="listFilter"></select>
          <button id="randomButton" type="button">Random</button>
        </section>
        <section class="problem-area">
          <div class="problem-head">
            <span>Problem</span>
            <span>Pattern</span>
            <span>Level</span>
            <span class="result-count">0 shown</span>
          </div>
          <div class="problem-list"></div>
        </section>
      </main>
    </div>
    <script>
      window.SHEET_CONFIG = {
        type: 'neetcode',
        initialList: 'neetcode250',
        lockList: true,
        title: 'NeetCode 250',
        shortTitle: 'NeetCode 250',
        subtitle: '250 problems',
        kicker: 'neetcode-250',
        description: 'The NeetCode 250 track as a focused sheet with pattern filters, problem links, solutions, and videos.',
        dataUrl: '../data/neetcode-problems.json',
        excelUrl: '../sheets/neetcode-problems.xlsx'
      };
    </script>
    <script src="../assets/app.js?v=5"></script>
  </body>
</html>
