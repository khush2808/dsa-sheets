<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Striver 79 Sheet</title>
    <link rel="stylesheet" href="../assets/app.css?v=7" />
  </head>
  <body>
    <div class="shell">
      <aside class="side">
        <div class="brand">
          <div class="mark">79</div>
          <div>
            <h1></h1>
            <p></p>
          </div>
        </div>
        <nav class="nav-links">
          <a href="../strivers-a2z-sheet/">Striver A2Z</a>
          <a href="../blind-75-sheet/">Blind 75 Sheet</a>
          <a href="../sde-sheet/">SDE Sheet</a>
          <a aria-current="page" href="../striver-79-sheet/">Striver 79</a>
          <a href="../neetcode-all/">NeetCode All</a>
          <a href="../neetcode-250/">NeetCode 250</a>
          <a href="../neetcode-150/">NeetCode 150</a>
          <a href="../blind-75/">NeetCode Blind 75</a>
          <a class="download" href="../sheets/striver-79-sheet-problems.xlsx">Download Excel</a>
          <a class="download" href="../sheets/dsa-problem-lists.xlsx">Download All</a>
        </nav>
        <h2>Sections</h2>
        <div class="category-list"></div>
      </aside>
      <main class="main">
        <section class="top">
          <div class="hero">
            <canvas id="heroCanvas"></canvas>
            <div class="hero-content">
              <p class="eyebrow"></p>
              <h2></h2>
              <p></p>
            </div>
          </div>
          <aside class="summary">
            <div class="stat-grid"></div>
          </aside>
        </section>
        <section class="toolbar">
          <input id="search" type="search" placeholder="Search problems" />
          <select id="categoryFilter"></select>
          <select id="difficultyFilter">
            <option value="all">All difficulties</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
          <select id="listFilter"></select>
          <button id="randomButton" type="button">Random</button>
        </section>
        <section class="problem-area">
          <div class="problem-head">
            <span>Problem</span>
            <span>Section</span>
            <span>Level</span>
            <span class="result-count">0 shown</span>
          </div>
          <div class="problem-list"></div>
        </section>
      </main>
    </div>
    <script>
      window.SHEET_CONFIG = {
        type: 'striver',
        title: 'Striver 79 Sheet',
        shortTitle: 'Striver 79',
        subtitle: '79 problems',
        kicker: 'striver-79-sheet',
        description: 'Striver’s last-minute DSA interview sheet with article, LeetCode, video, Plus, and editorial links.',
        dataUrl: '../data/striver-79-sheet-problems.json',
        excelUrl: '../sheets/striver-79-sheet-problems.xlsx'
      };
    </script>
    <script src="../assets/app.js?v=7"></script>
  </body>
</html>
