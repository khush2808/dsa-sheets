<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Striver 79 Sheet</title>
    <link rel="stylesheet" href="../assets/app.css?v=12" />
  </head>
  <body>
    <div class="shell">
      <aside class="side">
        <div class="brand">
          <div class="brand-main">
          <div class="mark">79</div>
          <div>
            <h1></h1>
            <p></p>
          </div>
        </div>
          <button id="themeToggle" class="icon-button" type="button" aria-label="Switch to dark mode" title="Switch to dark mode" aria-pressed="false">
            <svg class="theme-icon moon-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A8.5 8.5 0 1 1 11.2 3 6.5 6.5 0 0 0 21 12.8Z"></path></svg>
            <svg class="theme-icon sun-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
          </button>
        </div>
        <nav class="nav-links">
          <a href="../strivers-a2z-sheet/">Striver A2Z</a>
          <a href="../blind-75-sheet/">Blind 75 Sheet</a>
          <a href="../sde-sheet/">SDE Sheet</a>
          <a aria-current="page" href="../striver-79-sheet/">Striver 79</a>
          <a href="../neetcode-all/">NeetCode All</a>
          <a href="../neetcode-250/">NeetCode 250</a>
          <a href="../neetcode-150/">NeetCode 150</a>
          <a href="../blind-75/">NeetCode Blind 75</a>
        </nav>
        <h2>Sections</h2>
        <div class="category-list"></div>
      </aside>
      <main class="main">
        <section class="top">
          <div class="hero">
            <canvas id="heroCanvas"></canvas>
            <div class="hero-content">
              <p class="eyebrow"></p>
              <h2></h2>
              <p></p>
            </div>
          </div>
          <aside class="summary">
            <div class="stat-grid"></div>
            <div class="summary-actions">
              <a class="download" href="../sheets/dsa-problem-lists.xlsx">Download</a>
            </div>
          </aside>
        </section>
        <section class="toolbar">
          <input id="search" type="search" placeholder="Search problems" />
          <details id="difficultyFilter" class="filter-dropdown">
            <summary><span>Easy, Medium, Hard</span></summary>
            <div class="filter-menu">
              <label><input type="checkbox" value="easy" data-label="Easy" checked />Easy</label>
              <label><input type="checkbox" value="medium" data-label="Medium" checked />Medium</label>
              <label><input type="checkbox" value="hard" data-label="Hard" checked />Hard</label>
            </div>
          </details>
          <details id="proFilter" class="filter-dropdown">
            <summary><span>Pro</span></summary>
            <div class="filter-menu">
              <label><input id="includePro" type="checkbox" data-label="Pro" checked />Pro questions</label>
            </div>
          </details>
          <button id="randomButton" type="button">Random Pick</button>
        </section>
        <section class="problem-area">
          <div class="problem-head">
            <span>Problem</span>
            <span>Section</span>
            <span>Level</span>
            <span class="result-count">0 shown</span>
          </div>
          <div class="problem-list"></div>
        </section>
      </main>
    </div>
    <script>
      window.SHEET_CONFIG = {
        type: 'striver',
        title: 'Striver 79 Sheet',
        shortTitle: 'Striver 79',
        subtitle: '79 problems',
        kicker: 'striver-79-sheet',
        description: 'Striver’s last-minute DSA interview sheet with article, LeetCode, video, Plus, and editorial links.',
        dataUrl: '../data/striver-79-sheet-problems.json'
      };
    </script>
    <script src="../assets/app.js?v=12"></script>
  </body>
</html>
