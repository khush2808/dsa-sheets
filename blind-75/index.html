<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blind 75</title>
    <link rel="stylesheet" href="../host/shared/app.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="side">
        <div class="brand">
          <div class="mark">75</div>
          <div>
            <h1></h1>
            <p></p>
          </div>
        </div>
        <nav class="nav-links">
          <a href="../strivers-a2z-sheet/">Striver A2Z</a>
          <a href="../neetcode-all/">NeetCode All</a>
          <a href="../neetcode-250/">NeetCode 250</a>
          <a href="../neetcode-150/">NeetCode 150</a>
          <a aria-current="page" href="../blind-75/">Blind 75</a>
          <a class="download" href="../sheets/neetcode-problems.xlsx">Download Excel</a>
        </nav>
        <h2>Patterns</h2>
        <div class="category-list"></div>
      </aside>
      <main class="main">
        <section class="top">
          <div class="hero">
            <canvas id="heroCanvas"></canvas>
            <div class="hero-content">
              <p class="eyebrow"></p>
              <h2></h2>
              <p></p>
            </div>
          </div>
          <aside class="summary">
            <div class="stat-grid"></div>
          </aside>
        </section>
        <section class="toolbar">
          <input id="search" type="search" placeholder="Search problems" />
          <select id="categoryFilter"></select>
          <select id="difficultyFilter">
            <option value="all">All difficulties</option>
            <option value="Easy">Easy</option>
            <option value="Medium">Medium</option>
            <option value="Hard">Hard</option>
          </select>
          <select id="listFilter"></select>
          <button id="randomButton" type="button">Random</button>
        </section>
        <section class="problem-area">
          <div class="problem-head">
            <span>Problem</span>
            <span>Pattern</span>
            <span>Level</span>
            <span class="result-count">0 shown</span>
          </div>
          <div class="problem-list"></div>
        </section>
      </main>
    </div>
    <script>
      window.SHEET_CONFIG = {
        type: 'neetcode',
        initialList: 'blind75',
        lockList: true,
        title: 'Blind 75',
        shortTitle: 'Blind 75',
        subtitle: '75 problems',
        kicker: 'blind-75',
        description: 'The classic Blind 75 problem set with pattern filters, LeetCode links, NeetCode pages, solutions, and videos.',
        dataUrl: '../neetcode-problems.json',
        excelUrl: '../sheets/neetcode-problems.xlsx'
      };
    </script>
    <script src="../host/shared/app.js"></script>
  </body>
</html>
