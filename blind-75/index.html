<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blind 75</title>
    <link rel="stylesheet" href="../assets/app.css?v=8" />
  </head>
  <body>
    <div class="shell">
      <aside class="side">
        <div class="brand">
          <div class="brand-main">
          <div class="mark">75</div>
          <div>
            <h1></h1>
            <p></p>
          </div>
        </div>
          <button id="themeToggle" class="icon-button" type="button" aria-label="Switch to dark mode" title="Switch to dark mode" aria-pressed="false"></button>
        </div>
        <nav class="nav-links">
          <a href="../strivers-a2z-sheet/">Striver A2Z</a>
          <a href="../blind-75-sheet/">Blind 75 Sheet</a>
          <a href="../sde-sheet/">SDE Sheet</a>
          <a href="../striver-79-sheet/">Striver 79</a>
          <a href="../neetcode-all/">NeetCode All</a>
          <a href="../neetcode-250/">NeetCode 250</a>
          <a href="../neetcode-150/">NeetCode 150</a>
          <a aria-current="page" href="../blind-75/">NeetCode Blind 75</a>
        </nav>
        <h2>Patterns</h2>
        <div class="category-list"></div>
      </aside>
      <main class="main">
        <section class="top">
          <div class="hero">
            <canvas id="heroCanvas"></canvas>
            <div class="hero-content">
              <p class="eyebrow"></p>
              <h2></h2>
              <p></p>
            </div>
          </div>
          <aside class="summary">
            <div class="stat-grid"></div>
            <div class="summary-actions">
              <a class="download primary" href="">Download Excel</a>
              <a class="download" href="../sheets/dsa-problem-lists.xlsx">Download All</a>
              <button id="randomButton" class="cta-button" type="button">Random Pick</button>
            </div>
          </aside>
        </section>
        <section class="toolbar">
          <input id="search" type="search" placeholder="Search problems" />
          <details id="difficultyFilter" class="filter-dropdown">
            <summary><span>Easy, Medium, Hard</span></summary>
            <div class="filter-menu">
              <label><input type="checkbox" value="easy" data-label="Easy" checked />Easy</label>
              <label><input type="checkbox" value="medium" data-label="Medium" checked />Medium</label>
              <label><input type="checkbox" value="hard" data-label="Hard" checked />Hard</label>
            </div>
          </details>
          <details id="proFilter" class="filter-dropdown">
            <summary><span>Pro</span></summary>
            <div class="filter-menu">
              <label><input id="includePro" type="checkbox" data-label="Pro" checked />Pro questions</label>
            </div>
          </details>
        </section>
        <section class="problem-area">
          <div class="problem-head">
            <span>Problem</span>
            <span>Pattern</span>
            <span>Level</span>
            <span class="result-count">0 shown</span>
          </div>
          <div class="problem-list"></div>
        </section>
      </main>
    </div>
    <script>
      window.SHEET_CONFIG = {
        type: 'neetcode',
        initialList: 'blind75',
        lockList: true,
        title: 'Blind 75',
        shortTitle: 'Blind 75',
        subtitle: '75 problems',
        kicker: 'blind-75',
        description: 'The classic Blind 75 problem set with pattern filters, LeetCode links, NeetCode pages, solutions, and videos.',
        dataUrl: '../data/neetcode-problems.json',
        excelUrl: '../sheets/neetcode-problems.xlsx'
      };
    </script>
    <script src="../assets/app.js?v=8"></script>
  </body>
</html>
